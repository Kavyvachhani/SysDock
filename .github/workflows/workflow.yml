name: Publish SysDock to PyPI

on:
  push:
    tags:
      - "v*.*.*"          # triggers on tags like v1.4.0
  release:
    types: [published]    # also triggers when a GitHub Release is published

jobs:
  # ── Build pure-Python wheel (works for all platforms) ──────────────────────
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build

      - name: Clean old dist files (prevent stale packages from being uploaded)
        run: rm -rf dist/

      - name: Build wheel and sdist
        run: python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ── Run tests on all 3 platforms before publishing ─────────────────────────
  test:
    name: Test (${{ matrix.os }})
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11"]

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install psutil rich click

      - name: Install package (editable)
        run: pip install -e .

      - name: Run collector smoke tests
        shell: bash
        run: python -c "
from infravision_agent.collectors import system, disk, network, processes
import json

s = system.collect_all()
assert s.get('hostname'), 'hostname missing'
assert s.get('cpu'), 'cpu missing'
assert s.get('memory'), 'memory missing'

d = disk.collect_all()
assert 'partitions' in d, 'partitions missing'

n = network.collect_all()
assert 'interfaces' in n, 'interfaces missing'

p = processes.collect_all()
assert 'summary' in p, 'summary missing'

print('All collector checks passed on', s['hostname']['os'])
"

  # ── Publish to PyPI (OIDC Trusted Publisher, no API token needed) ──────────
  publish:
    name: Publish to PyPI
    needs: [build, test]
    runs-on: ubuntu-latest
    environment: sysdock

    permissions:
      id-token: write

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
