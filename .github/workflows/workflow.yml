name: Publish SysDock to PyPI

on:
  push:
    tags:
      - "v*.*.*"
  release:
    types: [published]

jobs:
  # ── Build distribution ──────────────────────────────────────────────────────
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build

      - name: Clean old dist files
        run: rm -rf dist/

      - name: Build wheel and sdist
        run: python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ── Multi-platform smoke tests ──────────────────────────────────────────────
  test:
    name: Test on ${{ matrix.os }}
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install psutil rich click

      - name: Install package
        run: pip install -e .

      - name: Smoke test collectors
        run: |
          python -c "from infravision_agent.collectors import system; s = system.collect_all(); assert s.get('hostname'); assert s.get('cpu'); assert s.get('memory'); print('PASS:', s['hostname']['os'])"

  # ── Publish to PyPI (OIDC Trusted Publisher) ────────────────────────────────
  publish:
    name: Publish to PyPI
    needs: [build, test]
    runs-on: ubuntu-latest
    environment: sysdock
    permissions:
      id-token: write

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  # ── Build Native Executables (macOS / Windows) ──────────────────────────────
  build_exe:
    name: Build Executables
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            name: SysDock_macOS
            ext: ""
          - os: windows-latest
            name: SysDock_Windows
            ext: ".exe"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install psutil rich click pyinstaller
          pip install -e .

      - name: Build with PyInstaller
        run: pyinstaller --clean -F --name ${{ matrix.name }} --paths . infravision_agent/__main__.py

      - name: Upload Executable Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/${{ matrix.name }}${{ matrix.ext }}

