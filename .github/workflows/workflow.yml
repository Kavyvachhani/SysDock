name: Publish SysDock to PyPI

on:
  push:
    tags:
      - "v*.*.*"
  release:
    types: [published]

jobs:
  # ── Build distribution ──────────────────────────────────────────────────────
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build

      - name: Clean old dist files
        run: rm -rf dist/

      - name: Build wheel and sdist
        run: python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ── Multi-platform smoke tests ──────────────────────────────────────────────
  test:
    name: Test on ${{ matrix.os }}
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install psutil rich click

      - name: Install package
        run: pip install -e .

      - name: Smoke test collectors
        run: |
          python -c "from sysdock.collectors import system; s = system.collect_all(); assert s.get('hostname'); assert s.get('cpu'); assert s.get('memory'); print('PASS:', s['hostname']['os'])"

  # ── Publish to PyPI (OIDC Trusted Publisher) ────────────────────────────────
  publish:
    name: Publish to PyPI
    needs: [build, test, build_exe]   # only after all tests AND all native builds pass
    runs-on: ubuntu-latest
    environment: sysdock
    permissions:
      id-token: write

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  # ── Build Native Executables (Linux, macOS, Windows) ───────────────────────
  build_exe:
    name: Build Native Installers
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: sysdock
            dist_file: sysdock_linux.deb
            out_dir: ubuntu

          - os: macos-latest
            name: sysdock
            dist_file: SysDock_macOS.pkg
            out_dir: mac

          - os: windows-latest
            name: sysdock
            dist_file: SysDock_Windows.zip
            out_dir: windows

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install psutil rich click pyinstaller
          pip install -e .

      - name: Build with PyInstaller
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            pyinstaller --noconfirm --clean platforms/mac/sysdock_mac.spec
          elif [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            pyinstaller --noconfirm --clean -F --name ${{ matrix.name }} --paths . sysdock/__main__.py
          else
            # Windows (Git Bash)
            if [ -f "platforms/windows/SysDock.ico" ]; then
              pyinstaller --noconfirm --clean --name ${{ matrix.name }} --paths . --icon "platforms/windows/SysDock.ico" sysdock/__main__.py
            else
              pyinstaller --noconfirm --clean --name ${{ matrix.name }} --paths . sysdock/__main__.py
            fi
          fi


      # ----- Linux: Create .deb (dpkg) -----
      - name: Build Linux .deb package
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p build_deb/usr/local/bin
          cp dist/${{ matrix.name }} build_deb/usr/local/bin/sysdock
          chmod +x build_deb/usr/local/bin/sysdock
          
          # Add .desktop file
          mkdir -p build_deb/usr/share/applications
          mkdir -p build_deb/usr/share/pixmaps
          if [ -f "cloud.png" ]; then
            cp cloud.png build_deb/usr/share/pixmaps/sysdock.png
            ICON="sysdock"
          else
            ICON="utilities-system-monitor"
          fi
          cat <<EOF > build_deb/usr/share/applications/sysdock.desktop
          [Desktop Entry]
          Version=1.0
          Name=SysDock
          Comment=SysDock Monitoring Dashboard
          Exec=x-terminal-emulator -e /usr/local/bin/sysdock dash
          Icon=${ICON}
          Terminal=false
          Type=Application
          Categories=System;Monitor;
          EOF
          sed -i 's/^ \{10\}//' build_deb/usr/share/applications/sysdock.desktop
          chmod 644 build_deb/usr/share/applications/sysdock.desktop
          
          mkdir -p build_deb/DEBIAN
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          cat <<EOF > build_deb/DEBIAN/control
          Package: sysdock
          Version: ${VERSION}
          Section: base
          Priority: optional
          Architecture: amd64
          Maintainer: Kavy Vachhani <kavy@vachhani.com>
          Description: SysDock monitoring agent and live dashboard
          EOF
          sed -i 's/^ \{10\}//' build_deb/DEBIAN/control
          mkdir -p dist/${{ matrix.out_dir }}
          dpkg-deb --build build_deb dist/${{ matrix.out_dir }}/${{ matrix.dist_file }}
          echo "Run 'sudo dpkg -i ${{ matrix.dist_file }}' to install natively on Linux." > dist/${{ matrix.out_dir }}/README.txt

      # ----- macOS: Package the .app bundle directly into .pkg -----
      - name: Build macOS .pkg
        if: matrix.os == 'macos-latest'
        run: |
          # The spec produces dist/SysDock.app — package it directly
          mkdir -p dist/${{ matrix.out_dir }}
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"

          # Copy icon from platforms/mac if it exists
          if [ -f "platforms/mac/SysDock.icns" ]; then
            cp "platforms/mac/SysDock.icns" "dist/SysDock.app/Contents/Resources/SysDock.icns" 2>/dev/null || true
          fi

          pkgbuild \
            --component dist/SysDock.app \
            --identifier io.sysdock.app \
            --version "${VERSION:-1.4.6}" \
            --install-location /Applications \
            dist/${{ matrix.out_dir }}/SysDock_macOS.pkg

          echo "Double-click SysDock_macOS.pkg to install SysDock." > dist/${{ matrix.out_dir }}/README.txt

      # ----- Windows: Copy .exe into output dir and zip -----
      - name: Collect Windows folder
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist\SysDock_Windows
          New-Item -ItemType Directory -Force -Path dist\${{ matrix.out_dir }}
          # PyInstaller -F produces dist\sysdock.exe (single file)
          # PyInstaller without -F produces dist\sysdock\sysdock.exe (folder)
          if (Test-Path "dist\sysdock.exe") {
            Copy-Item "dist\sysdock.exe" "dist\SysDock_Windows\sysdock.exe" -Force
          } elseif (Test-Path "dist\sysdock\sysdock.exe") {
            Copy-Item "dist\sysdock\sysdock.exe" "dist\SysDock_Windows\sysdock.exe" -Force
          } else {
            Write-Error "Could not find sysdock.exe in dist\ or dist\sysdock\"
            exit 1
          }
          Compress-Archive -Path "dist\SysDock_Windows" -DestinationPath "dist\${{ matrix.out_dir }}\${{ matrix.dist_file }}" -Force
          Set-Content dist\${{ matrix.out_dir }}\README.txt "Extract the zip and run sysdock.exe inside the folder to start SysDock on Windows."

      # ----- Upload artifact for next job to download -----
      - name: Upload Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.out_dir }}
          path: dist/${{ matrix.out_dir }}/

  # ── Publish to GitHub Releases (versioned tag + rolling 'latest') ──────────
  release_latest:
    name: Publish GitHub Release
    needs: [build_exe, publish]   # only after native builds AND pip publish all pass
    runs-on: ubuntu-latest
    # Only runs on tag pushes (not bare 'release: published' events that lack a tag)
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write   # needed to create/update releases and tags

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so we can move tags

      # Download all three installer artifacts
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: ubuntu
          path: release_assets/

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: mac
          path: release_assets/

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows
          path: release_assets/

      - name: List release assets
        run: ls -lh release_assets/

      # ── Create / update the versioned release ──────────────────────────────
      - name: Create versioned GitHub Release and upload assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          # Create the release (skip if it already exists from 'release: published')
          gh release create "${TAG}" \
            --title "SysDock ${TAG}" \
            --notes "## SysDock ${TAG}

          ### Native installers
          | Platform | File |
          |----------|------|
          | 🍎 macOS | \`SysDock_macOS.pkg\` |
          | 🐧 Linux | \`sysdock_linux.deb\` |
          | 🪟 Windows | \`SysDock_Windows.zip\` |

          Install with:
          - **macOS**: double-click \`SysDock_macOS.pkg\`
          - **Linux**: \`sudo dpkg -i sysdock_linux.deb\`
          - **Windows**: extract \`SysDock_Windows.zip\` and run \`sysdock.exe\`
          - **pip** (all platforms): \`pip install sysdock\`" \
            release_assets/sysdock_linux.deb \
            release_assets/SysDock_macOS.pkg \
            release_assets/SysDock_Windows.zip \
            || true   # tolerate 'already exists' gracefully

      # ── Move the rolling 'latest' tag and release ──────────────────────────
      - name: Update rolling 'latest' release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          # Delete old 'latest' release + tag (ignore errors if they don't exist yet)
          gh release delete latest --yes 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true

          # Re-create 'latest' pointing at the new commit
          git tag -f latest
          git push origin latest --force

          gh release create latest \
            --title "SysDock latest (${TAG})" \
            --notes "This is the **rolling latest release**, always tracking the newest tag.
          Current tag: \`${TAG}\`

          ### Native installers
          | Platform | File |
          |----------|------|
          | 🍎 macOS | \`SysDock_macOS.pkg\` |
          | 🐧 Linux | \`sysdock_linux.deb\` |
          | 🪟 Windows | \`SysDock_Windows.zip\` |" \
            --prerelease \
            release_assets/sysdock_linux.deb \
            release_assets/SysDock_macOS.pkg \
            release_assets/SysDock_Windows.zip
