name: Publish SysDock to PyPI

on:
  push:
    tags:
      - "v*.*.*"        # triggers on tags like v1.1.0, v2.0.0, etc.
  release:
    types: [published]  # also triggers when a GitHub Release is published

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build

      - name: Build wheel and sdist
        run: python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: SysDock          # matches the Environment name on PyPI Trusted Publisher form

    # Required for PyPI Trusted Publisher (OIDC — no API token needed)
    permissions:
      id-token: write

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
