name: Publish SysDock to PyPI

on:
  push:
    tags:
      - "v*.*.*"
  release:
    types: [published]

jobs:
  # ── Build distribution ──────────────────────────────────────────────────────
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build

      - name: Clean old dist files
        run: rm -rf dist/

      - name: Build wheel and sdist
        run: python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ── Multi-platform smoke tests ──────────────────────────────────────────────
  test:
    name: Test on ${{ matrix.os }}
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install psutil rich click

      - name: Install package
        run: pip install -e .

      - name: Smoke test collectors
        run: |
          python -c "from infravision_agent.collectors import system; s = system.collect_all(); assert s.get('hostname'); assert s.get('cpu'); assert s.get('memory'); print('PASS:', s['hostname']['os'])"

  # ── Publish to PyPI (OIDC Trusted Publisher) ────────────────────────────────
  publish:
    name: Publish to PyPI
    needs: [build, test]
    runs-on: ubuntu-latest
    environment: sysdock
    permissions:
      id-token: write

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  # ── Build Native Executables (Linux Only) ─────────────────────────────
  build_exe:
    name: Build Native Installers
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: sysdock
            dist_file: sysdock_linux.deb
            out_dir: SysDock_Linux

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install psutil rich click pyinstaller
          pip install -e .

      - name: Build with PyInstaller
        run: pyinstaller --clean -F --name ${{ matrix.name }} --paths . infravision_agent/__main__.py

      # ----- Linux: Create .deb (dpkg) -----
      - name: Build Linux .deb package
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p build_deb/usr/local/bin
          cp dist/${{ matrix.name }} build_deb/usr/local/bin/sysdock
          chmod +x build_deb/usr/local/bin/sysdock
          mkdir -p build_deb/DEBIAN
          cat <<EOF > build_deb/DEBIAN/control
          Package: sysdock
          Version: 1.4.5
          Section: base
          Priority: optional
          Architecture: amd64
          Maintainer: SysDock <info@sysdock.io>
          Description: SysDock monitoring agent and live dashboard
          EOF
          mkdir -p dist/${{ matrix.out_dir }}
          dpkg-deb --build build_deb dist/${{ matrix.out_dir }}/${{ matrix.dist_file }}
          echo "Run 'sudo dpkg -i ${{ matrix.dist_file }}' to install natively on Linux." > dist/${{ matrix.out_dir }}/README.txt

      # ----- Upload Native Artifacts -----
      - name: Upload Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.out_dir }}
          path: dist/${{ matrix.out_dir }}/


